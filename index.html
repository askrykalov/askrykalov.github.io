<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <script>
       async function setSinkId(deviceId, tag) {
          await tag.setSinkId(deviceId)
          return new Promise((resolve) => {
             setTimeout(() => {
                resolve();
             }, 5000)
          })
       }

       async function checkAudio() {
          const audioTag = document.getElementsByTagName("audio")[0];
          await navigator.mediaDevices.getUserMedia({
             audio: true
          })
          const devices = await navigator.mediaDevices.enumerateDevices()
          for (const device of devices) {
             if (device.kind === 'audiooutput') {
                console.log(`Устанавливаем вывод звука в ${device.deviceId},
                название устройства  ${device.label}`);
                await setSinkId(device.deviceId, audioTag)
                console.log('Установили');
             }
          }
       }
    </script>
    <title>Тест приглушения звука</title>
</head>
<body>


<audio controls>
    <source src="1.mp3" type="audio/mpeg">
</audio>
<input type="button" value="Проверить" onclick="checkAudio()">
</body>
</html>
